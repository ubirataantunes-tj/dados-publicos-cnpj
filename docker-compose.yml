version: '3.8'

services:
  postgres:
    image: bitnami/postgresql:17
    container_name: receita_postgres
    environment:
      - POSTGRESQL_DATABASE=${DB_NAME:-receita_cnpj}
      - POSTGRESQL_USERNAME=${DB_USER:-postgres}
      - POSTGRESQL_PASSWORD=${DB_PASSWORD:?Defina DB_PASSWORD no .env}
      - POSTGRESQL_ROOT_PASSWORD=${DB_PASSWORD:?Defina DB_PASSWORD no .env}
      - POSTGRESQL_PORT_NUMBER=5432
    ports:
      - "${DB_PORT:-5436}:5432"
    volumes:
      - postgres_data:/bitnami/postgresql
      - ./code/banco_de_dados.sql:/docker-entrypoint-initdb.d/init.sql
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres} -d ${DB_NAME:-receita_cnpj}"]
      interval: 30s
      timeout: 10s
      retries: 5

volumes:
  postgres_data:
    driver: local